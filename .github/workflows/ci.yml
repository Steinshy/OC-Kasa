name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main
  schedule:
    - cron: '0 0 * * 0'

jobs:
  lint-and-test:
    name: Lint, Format Check & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check code formatting
        if: always()
        run: pnpm format:check

      - name: Run Stylelint
        if: always()
        run: pnpm stylelint

      - name: Type check
        if: always()
        run: pnpm typecheck

  security-audit:
    name: Security & Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for outdated packages
        if: always()
        run: |
          echo "## Outdated Packages" >> $GITHUB_STEP_SUMMARY
          pnpm outdated >> $GITHUB_STEP_SUMMARY || echo "Run 'pnpm outdated' locally for details."

      - name: Generate audit report
        if: always()
        run: |
          echo "## Security Audit" >> $GITHUB_STEP_SUMMARY
          pnpm audit --audit-level=moderate >> $GITHUB_STEP_SUMMARY || echo "Vulnerabilities found - run 'pnpm audit' locally for details." >> $GITHUB_STEP_SUMMARY

  bundle-size:
    name: Bundle Size & Performance Budget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        env:
          VITE_BASE_PATH: '/'
        run: pnpm analyze

      - name: Upload bundle stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bundle-stats
          path: dist/stats.html
          retention-days: 7

      - name: Check performance budget
        if: always()
        run: |
          JS_BUDGET=400
          CSS_BUDGET=50
          TOTAL_BUDGET=500

          JS_SIZE=$(find dist/assets -name "*.js" -type f -exec du -sb {} + 2>/dev/null | awk '{sum+=$1} END {print int(sum/1024)}' || echo "0")
          CSS_SIZE=$(find dist/assets -name "*.css" -type f -exec du -sb {} + 2>/dev/null | awk '{sum+=$1} END {print int(sum/1024)}' || echo "0")
          TOTAL_SIZE=$((JS_SIZE + CSS_SIZE))

          echo "## Performance Budget" >> $GITHUB_STEP_SUMMARY
          echo "- JavaScript: ${JS_SIZE} KB (budget: ${JS_BUDGET} KB)" >> $GITHUB_STEP_SUMMARY
          echo "- CSS: ${CSS_SIZE} KB (budget: ${CSS_BUDGET} KB)" >> $GITHUB_STEP_SUMMARY
          echo "- Total (JS+CSS): ${TOTAL_SIZE} KB (budget: ${TOTAL_BUDGET} KB)" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          [ "$JS_SIZE" -gt "$JS_BUDGET" ] && { echo "::error::JavaScript bundle (${JS_SIZE} KB) exceeds budget (${JS_BUDGET} KB)"; FAILED=1; }
          [ "$CSS_SIZE" -gt "$CSS_BUDGET" ] && { echo "::error::CSS bundle (${CSS_SIZE} KB) exceeds budget (${CSS_BUDGET} KB)"; FAILED=1; }
          [ "$TOTAL_SIZE" -gt "$TOTAL_BUDGET" ] && { echo "::error::Total bundle (${TOTAL_SIZE} KB) exceeds budget (${TOTAL_BUDGET} KB)"; FAILED=1; }

          if [ "$FAILED" -eq 0 ]; then
            echo "✅ All bundles within performance budget" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Performance budget exceeded" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
