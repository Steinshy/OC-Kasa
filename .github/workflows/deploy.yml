name: Deploy to GitHub Pages

on:
  push:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.6.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Copy index.html to 404.html for SPA routing
        run: cp ./dist/index.html ./dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    name: Deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25.6.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wait for deployment
        run: sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './.lighthouserc.js'
          uploadArtifacts: true
          temporaryPublicStorage: true
          urls: |
            https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/

      - name: Format Lighthouse results
        if: always()
        run: |
          echo "## Lighthouse Performance Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f ".lighthouseci/assertion-results.json" ]; then
            echo "### Performance Scores" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the Lighthouse CI output above for detailed scores." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Core Web Vitals" >> $GITHUB_STEP_SUMMARY
            echo "- **First Contentful Paint (FCP)**: Target < 2.0s" >> $GITHUB_STEP_SUMMARY
            echo "- **Largest Contentful Paint (LCP)**: Target < 2.5s" >> $GITHUB_STEP_SUMMARY
            echo "- **Cumulative Layout Shift (CLS)**: Target < 0.1" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Blocking Time (TBT)**: Target < 300ms" >> $GITHUB_STEP_SUMMARY
            echo "- **Speed Index**: Target < 3.0s" >> $GITHUB_STEP_SUMMARY
            echo "- **Time to Interactive (TTI)**: Target < 3.8s" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Lighthouse results not found. Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lighthouse-reports
          path: .lighthouseci/
          retention-days: 7
